<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>iOS9 Music Player</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#121212;
    color:white;
    font-family:Arial;
    box-sizing:border-box;
}

.container{

    display:-webkit-box;
    display:-webkit-flex;
    display:flex;

    -webkit-box-orient:vertical;
    -webkit-box-direction:normal;

    -webkit-flex-direction:column;
    flex-direction:column;

    max-width:500px;
    margin:0 auto;
}

.player{
    background:#181818;
    padding:20px;
    border-radius:15px;
}

#title{
    font-size:22px;
    margin-bottom:5px;
}

#artist{
    color:#aaa;
    margin-bottom:15px;
}

.controls{
    margin-bottom:15px;
}

button{
    background:#1db954;
    border:none;
    padding:10px;
    margin-right:5px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:active{
    opacity:0.7;
}

#songList{
    margin-top:15px;
    max-height:250px;
    overflow-y:auto;
}

.song-item{
    background:#222;
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
    cursor:pointer;

    -webkit-transition:0.2s;
    transition:0.2s;
}

.song-item.active{
    background:#1db954;
    color:black;
}

.lyrics-panel{
    margin-top:20px;
    background:#181818;
    padding:20px;
    border-radius:15px;
}

#lyrics{
    white-space:pre-line;
    color:#ccc;
    max-height:300px;
    overflow-y:auto;
}

.line{
    padding:4px 0;
    opacity:0.5;
}

.line.active{
    color:#1db954;
    opacity:1;
}

#toast{

    position:fixed;
    bottom:20px;
    right:20px;

    background:#1db954;
    color:black;

    padding:10px 15px;
    border-radius:8px;

    opacity:0;

    -webkit-transform:translateY(20px);
    transform:translateY(20px);

    -webkit-transition:0.3s;
    transition:0.3s;
}

#toast.show{

    opacity:1;

    -webkit-transform:translateY(0px);
    transform:translateY(0px);
}

</style>

</head>
<body>

<div class="container">

<div class="player">

<div id="title">Loading...</div>
<div id="artist"></div>

<audio id="audio" preload="auto"></audio>

<div class="controls">

<button onclick="prev()">⏮</button>

<button onclick="playPause()" id="playBtn">
▶
</button>

<button onclick="next()">⏭</button>

</div>

<div id="songList"></div>

</div>

<div class="lyrics-panel">

<h3>Lyrics</h3>

<div id="lyrics"></div>

</div>

</div>

<div id="toast"></div>

<!-- songs.js -->
<script src="songs.js?v=1"></script>

<!-- app.js -->
<script src="app.js?v=1"></script>

</body>
</html>
